<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Received - Solvente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary-teal: #1B6A78; --accent-lime: #97C94E; }
        body { background-color: #F8F8F8; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-10 text-center border border-gray-100">
        <div class="inline-flex items-center justify-center w-20 h-20 bg-green-100 text-[--accent-lime] rounded-full mb-6">
            <i data-lucide="check-circle" class="w-10 h-10"></i>
        </div>
        <h1 class="text-3xl font-bold text-[--primary-teal] mb-4">Message Sent!</h1>
        <p class="text-gray-600 mb-8 leading-relaxed">
            Thank you for reaching out to Solvente. A member of our team will review your inquiry and get back to you shortly.
        </p>
        <a href="index.html" class="inline-block w-full py-4 bg-[--primary-teal] text-white font-bold rounded-xl hover:bg-[#125763] transition duration-200 shadow-lg shadow-[--primary-teal]/30">
            Back to Homepage
        </a>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
